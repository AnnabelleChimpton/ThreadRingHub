services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: ringhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ringhub}
      POSTGRES_USER: ${POSTGRES_USER:-ringhub}
      # Secret: no default. Provide via the gitignored .env next to this file.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      # Localhost-only: with trust auth, a public 5432 is a passwordless
      # database open to the internet. Docker published ports bypass most
      # host firewalls, so the binding itself must be loopback.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ringhub -d ringhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: ringhub-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "autoheal=true"

  # Ring Hub API (development)
  hub-api:
    build:
      context: .
      dockerfile: ./apps/hub-api/Dockerfile.dev
      target: development
    container_name: ringhub-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      # Password comes from the secret POSTGRES_PASSWORD (no default) so the
      # connection string never hardcodes a credential.
      DATABASE_URL: postgresql://${POSTGRES_USER:-ringhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ringhub}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # Secrets: no defaults. In production these MUST be set in .env.
      SIGNING_KEY: ${SIGNING_KEY}
      JWT_SECRET: ${JWT_SECRET}
      # Persistent Ed25519 badge-signing key (base64 of a PKCS#8 PEM key).
      # Unset => hub runs with an ephemeral key and refuses to issue badges in production.
      RING_HUB_PRIVATE_KEY: ${RING_HUB_PRIVATE_KEY}
      # Break-glass admin token consumed by security/middleware.ts.
      RINGHUB_BREAK_GLASS_TOKEN: ${RINGHUB_BREAK_GLASS_TOKEN}
      # Instance configuration
      INSTANCE_DID: ${INSTANCE_DID:-did:web:localhost:3000}
      INSTANCE_NAME: ${INSTANCE_NAME:-Ring Hub Development}
      # Feature flags
      FEDERATION_ENABLED: ${FEDERATION_ENABLED:-false}
      ACTIVITYPUB_ENABLED: ${ACTIVITYPUB_ENABLED:-false}
      # Security settings (relaxed for development)
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1000}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      # Localhost-only: the reverse proxy on this host is the sole public entry
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:9229:9229" # Node.js debugger
    volumes:
      - ./apps/hub-api:/app/apps/hub-api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/hub-api/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "autoheal=true"

  # Restarts any container whose healthcheck goes unhealthy (label-gated).
  # Without this, an unhealthy container just sits there — Redis once
  # zombied for months with "Up (unhealthy)" status.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: ringhub-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Adminer for database management (development only)
  adminer:
    image: adminer:4-standalone
    container_name: ringhub-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: "dracula"

  # Redis Commander for cache management (development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ringhub-redis-commander
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: ringhub-network
